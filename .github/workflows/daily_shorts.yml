name: Daily YouTube Shorts Automation

on:
  schedule:
    # 01:00 UTC == 10:00 KST
    - cron: '0 1 * * *'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies for FFmpeg and Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libavcodec-extra
        # Flow AI scraping might require a standard browser, which ubuntu-latest has via google-chrome-stable, 
        # but webdriver manager handles it usually.

    - name: Install Python Dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Automation Script
      env:
        # We pass necessary API keys and secrets as environment variables.
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
        YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        FLOW_AI_COOKIE: ${{ secrets.FLOW_AI_COOKIE }} # Wait, Flow AI authentication cookie if needed
      run: |
        python main.py
